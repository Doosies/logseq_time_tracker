# Cursor Agent System Configuration Template
# 새 프로젝트에서 이 파일을 .cursor-agent-config.yaml로 복사하여 사용합니다.

project:
  name: "my-project" # 프로젝트 이름
  package_manager: "npm" # npm | yarn | pnpm
  monorepo: false # true | false

scripts:
  # package.json의 scripts에 정의된 명령어를 지정합니다.
  # 미지정 시 package.json의 scripts 섹션에서 자동 추론합니다.
  type_check: "npm run type-check"
  build: "npm run build"
  test: "npm test"
  lint: "npm run lint"
  format: "npm run format"

# 활성화할 스택 스킬 목록
# 사용 가능한 스택: svelte, react, chrome-extension, storybook, pnpm-monorepo
# 프로젝트에 해당하는 스택만 나열합니다.
# 예시:
# stack_skills:
#   - svelte
#   - react
#   - chrome-extension
#   - storybook
#   - pnpm-monorepo
stack_skills: []

locale:
  test_descriptions: "en" # ko | en — 테스트 설명 언어
  commit_subject: "en" # ko | en — 커밋 메시지 subject 언어
